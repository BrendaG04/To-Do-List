<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="images/png" href="images/brenwarelogo.png">
    <title>To-Do List</title>
    <link rel = "stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/fa5ca6f968.js" crossorigin="anonymous"></script>
</head>
<body>
    <h1>To-Do List</h1>

    <div class="progress-container">
        <label>Progress: </label>
        <progress id="progressBar" value="0" max="100"></progress>
        <span id="progressText">0%</span>
    </div>


    <div class = "todoContainer">
        <input type="text" id="taskInput" placeholder="Enter Task Here" >
        <button class="addTaskBtn" onclick="addTask()">Add</button>

        <div class = "listContainer">
            <ul id="taskList">  
                <li>
                    <input type="checkbox" class="task-checkbox">
                    <span class="task-text">Sample Task</span>
                    <button class="editTaskBtn" onclick="editTask(this)">
                        <i class="fas fa-pencil-alt"></i>
                    </button>
                    <button class="deleteTaskBtn" onclick="deleteTask(this)">
                        <i class="fas fa-trash"></i>
                    </button>
                </li>
            </ul>
        </div>
    </div>



    <br>
    <br>

    <div>
        <a href="digitalClock.html">
            Digital Clock
        </a>
    </div>
    
    <br>
    <br>    
    <br>

    <div id="stopwatchDiv">
        <h1 id="myH1">Stopwatch</h1>
        <div id="stopwatchContainer">
            <div id="stopwatchDisplay">
                00:00:00:00
            </div>
            <div id="controls">
                <button id="startBtn" onclick="start()">Start</button>
                <button id="stopBtn" onclick="stop()">Stop</button>
                <button id="resetBtn" onclick="reset()">Reset</button>

            </div>
        </div>
    </div>
    
    <div id="timeRecord">
        <div class="timeRecordContainer">
            <h2>Time Records</h2>
            <ul id="recordDisplay"></ul>
        </div>
    </div>


    <script src="index.js"></script>
</body>


</html>
